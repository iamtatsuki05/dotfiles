[tools."http:devin"]
version = "latest"
url = 'https://static.devin.ai/cli/{{ version }}/devin-{{ version }}-{{ arch(x64="x86_64", arm64="aarch64") }}-{{ os(macos="apple-darwin", linux="unknown-linux") }}.tar.gz'
