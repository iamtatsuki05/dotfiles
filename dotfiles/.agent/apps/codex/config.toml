model = "gpt-5.5"
sandbox_mode = "danger-full-access"
ignore_patterns = [
  "**/.env",
  "**/.env.*",
  "**/secrets.env",
  "**/credentials.json",
  "**/secrets.json",
  "**/*.key",
  "**/*.pem",
  "**/id_rsa",
  "**/id_ed25519",
  "config/shell/secrets.env",
  ".tmp/",
  ".waza-cache/",
  ".waza-results/",
  ".venv/",
  "__pycache__/",
  "node_modules/",
  "result",
  "result-*",
  "dotfiles/.agent/changes/",
  "dotfiles/.agent/work/"
]
model_reasoning_effort = "high"
hide_agent_reasoning = true
network_access = true
web_search = "live"
disable_response_storage = true
# for http header
rmcp_client = true
notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff"]
personality = "pragmatic"
service_tier = "fast"

[features]
fast_mode = true
external_migration = true
hooks = true
undo = true
goals = true
memories = true
chronicle = true
js_repl = false

[mcp_servers.deepwiki]
url = "https://mcp.deepwiki.com/mcp"
startup_timeout_sec = 60

[mcp_servers.devin]
url = "https://mcp.devin.ai/mcp"
bearer_token_env_var = "DEVIN_API_KEY"
startup_timeout_sec = 60

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"
startup_timeout_sec = 60

[mcp_servers.gemini-cli]
command = "bunx"
args = ["mcp-gemini-cli", "--allow-npx"]

[mcp_servers.colab-mcp]
command = "uvx"
args = ["git+https://github.com/googlecolab/colab-mcp"]
startup_timeout_sec = 60

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"
startup_timeout_sec = 60

[mcp_servers.playwright]
command = "bunx"
args = ["@playwright/mcp@latest"]

[mcp_servers.playwright.tools.browser_resize]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_evaluate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_run_code]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_tabs]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_fill_form]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_click]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_press_key]
approval_mode = "approve"

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true
