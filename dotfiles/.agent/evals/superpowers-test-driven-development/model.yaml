name: superpowers-test-driven-development-model-eval
description: |
  Model-backed quality evaluation for the superpowers:test-driven-development skill.
skill: "superpowers:test-driven-development"
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: tdd_workflow_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response require a failing test before implementation?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: red_green_refactor_detected
    config:
      regex_match:
        - "(?i)(red|green|refactor|failing test|test first)"
  - type: text
    name: verification_explained
    config:
      regex_match:
        - "(?i)(watch.*fail|verify|pass|minimal implementation|regression)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/plan-bugfix-tdd.yaml"
