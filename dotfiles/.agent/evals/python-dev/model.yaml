name: python-dev-model-eval
description: |
  Model-backed quality evaluation for the python-dev skill.
skill: python-dev
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: python_debugging_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response identify the Python failure and verification path?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: python_context_detected
    config:
      regex_match:
        - "(?i)(python|pytest|pydantic|typing|ruff)"
  - type: text
    name: test_or_fix_explained
    config:
      regex_match:
        - "(?i)(test|fix|validation|type|root cause)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/debug-pydantic-test.yaml"
