name: gemini-model-eval
description: |
  Model-backed quality evaluation for the gemini skill.
skill: gemini
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: gemini_consultation_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response frame a bounded Gemini CLI consultation?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: gemini_cli_detected
    config:
      regex_match:
        - "(?i)(gemini|gemini cli|consult|review)"
  - type: text
    name: prompt_or_scope_explained
    config:
      regex_match:
        - "(?i)(prompt|scope|result|read-only|finding)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/consult-gemini-architecture.yaml"
