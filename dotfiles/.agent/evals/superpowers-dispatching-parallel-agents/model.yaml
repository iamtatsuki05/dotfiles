name: superpowers-dispatching-parallel-agents-model-eval
description: |
  Model-backed quality evaluation for the superpowers:dispatching-parallel-agents skill.
skill: "superpowers:dispatching-parallel-agents"
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: dispatch_plan_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response distinguish independent work from blocking work?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: independent_tasks_detected
    config:
      regex_match:
        - "(?i)(independent|parallel|subagent|delegate|blocking)"
  - type: text
    name: coordination_explained
    config:
      regex_match:
        - "(?i)(scope|context|wait|integrate|critical path)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/plan-parallel-investigation.yaml"
