name: terraform-dev-model-eval
description: |
  Model-backed quality evaluation for the terraform-dev skill.
skill: terraform-dev
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: terraform_review_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response identify Terraform security and state risks?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: terraform_context_detected
    config:
      regex_match:
        - "(?i)(terraform|plan|resource|state|module)"
  - type: text
    name: security_or_drift_explained
    config:
      regex_match:
        - "(?i)(encryption|public|drift|import|lifecycle|policy)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/review-s3-plan.yaml"
