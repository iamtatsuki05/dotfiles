name: html-preview-review-model-eval
description: |
  Model-backed evaluation for evidence handling, reviewer separation, and safe viewer routing.
skill: html-preview-review
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: safe_html_review_workflow
    weight: 1.0
    threshold: 0.8
    description: Did the response keep correctness evidence separate and avoid unsafe publication fallbacks?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: keeps_main_agent_in_control
    config:
      regex_match:
        - "(?i)(main agent|メイン.*agent).*(reviewer|レビュー).*(判断|decide|present|提示)"
  - type: text
    name: uses_local_temp_html
    config:
      regex_match:
        - "(?i)(temp|一時).*(html|HTML)|file://"
  - type: text
    name: rejects_network_fallback
    config:
      regex_match:
        - "(?i)(do not|しない|禁止).*(upload|server|tailscale|external|外部|公開)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/*.yaml"
  - "tasks/artifact/*.yaml"
