name: html-preview-review-eval
description: |
  Smoke evaluation suite for the html-preview-review skill.
skill: html-preview-review
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6

metrics:
  - name: produces_review_artifact_plan
    weight: 1.0
    threshold: 0.8
    description: Did the skill describe a bounded local HTML review artifact?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 20"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/*.yaml"
