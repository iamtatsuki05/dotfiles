name: retrospective-codify-model-eval
description: |
  Model-backed quality evaluation for the retrospective-codify skill.
skill: retrospective-codify
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: codification_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response propose a reusable rule or skill update?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: learning_detected
    config:
      regex_match:
        - "(?i)(lesson|retrospective|codify|rule|skill)"
  - type: text
    name: artifact_or_verification_explained
    config:
      regex_match:
        - "(?i)(SKILL.md|lint|test|documentation|verify)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/codify-repeat-mistake.yaml"
