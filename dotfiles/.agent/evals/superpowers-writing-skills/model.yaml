name: superpowers-writing-skills-model-eval
description: |
  Model-backed quality evaluation for the superpowers:writing-skills skill.
skill: "superpowers:writing-skills"
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: skill_authoring_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response explain test-driven skill authoring?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: skill_authoring_detected
    config:
      regex_match:
        - "(?i)(skill|SKILL.md|pressure scenario|baseline|test-driven)"
  - type: text
    name: validation_explained
    config:
      regex_match:
        - "(?i)(verify|baseline|fail|pass|deploy|loophole)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/write-new-skill.yaml"
