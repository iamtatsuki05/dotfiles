name: ci-cd-model-eval
description: |
  Model-backed quality evaluation for the ci-cd skill.
skill: ci-cd
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: workflow_review_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response identify CI reliability and permissions issues?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: github_actions_detected
    config:
      regex_match:
        - "(?i)(github actions|workflow|ci|job|matrix)"
  - type: text
    name: cache_or_permissions_explained
    config:
      regex_match:
        - "(?i)(cache|permissions|token|concurrency|artifact)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/review-node-workflow.yaml"
