name: google-colab-cli-eval
description: |
  Smoke evaluation suite for the google-colab-cli skill.
  Uses the mock executor so repository validation can check Waza wiring without
  authenticating to Google, provisioning Colab runtimes, or using paid resources.
skill: google-colab-cli
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6

metrics:
  - name: google_colab_cli_response
    weight: 1.0
    threshold: 0.8
    description: Did the skill accept a Google Colab CLI setup, account, or runtime task?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 10"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/*.yaml"
