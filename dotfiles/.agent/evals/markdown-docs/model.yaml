name: markdown-docs-model-eval
description: |
  Model-backed quality evaluation for the markdown-docs skill. This suite is
  intentionally not run by waza-eval-all because it requires model credentials
  and asserts concrete document review outcomes.
skill: markdown-docs
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: markdown_review_quality
    weight: 1.0
    threshold: 0.8
    description: Did the review identify concrete Markdown structure issues?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: duplicated_headings_detected
    config:
      regex_match:
        - "(?i)(duplicate|duplicated|repeated).*heading|two.*setup|setup.*twice"
  - type: text
    name: ordering_or_structure_explained
    config:
      regex_match:
        - "(?i)(structure|order|usage|troubleshooting|heading)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/restructure-guide.yaml"
