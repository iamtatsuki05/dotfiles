name: markitdown-model-eval
description: |
  Model-backed quality evaluation for the markitdown skill.
skill: markitdown
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: conversion_plan_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response explain the conversion path and output checks?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: markitdown_detected
    config:
      regex_match:
        - "(?i)(markitdown|convert|markdown|pdf|docx)"
  - type: text
    name: output_validation_explained
    config:
      regex_match:
        - "(?i)(verify|check|table|image|format|output)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/convert-pdf-to-markdown.yaml"
