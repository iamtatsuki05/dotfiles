name: go-dev-model-eval
description: |
  Model-backed quality evaluation for the go-dev skill.
skill: go-dev
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: go_debugging_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response identify Go concurrency and test issues?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: go_context_detected
    config:
      regex_match:
        - "(?i)(go test|goroutine|race|channel|context)"
  - type: text
    name: verification_path_explained
    config:
      regex_match:
        - "(?i)(test|race detector|fix|root cause|go test)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/debug-go-race.yaml"
