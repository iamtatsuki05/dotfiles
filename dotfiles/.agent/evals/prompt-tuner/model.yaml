name: prompt-tuner-model-eval
description: |
  Model-backed quality evaluation for the prompt-tuner skill.
skill: prompt-tuner
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: prompt_improvement_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response improve the prompt with criteria and examples?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: prompt_context_detected
    config:
      regex_match:
        - "(?i)(prompt|instruction|system|template)"
  - type: text
    name: criteria_or_examples_explained
    config:
      regex_match:
        - "(?i)(criteria|rubric|example|constraint|evaluation)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/improve-support-prompt.yaml"
