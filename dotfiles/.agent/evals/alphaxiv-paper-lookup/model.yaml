name: alphaxiv-paper-lookup-model-eval
description: |
  Model-backed quality evaluation for the alphaxiv-paper-lookup skill.
skill: alphaxiv-paper-lookup
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: paper_summary_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response summarize the paper and extract implementation details?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: paper_context_detected
    config:
      regex_match:
        - "(?i)(arxiv|alphaxiv|paper|attention|transformer)"
  - type: text
    name: implementation_details_requested
    config:
      regex_match:
        - "(?i)(implementation|architecture|training|method|detail)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/summarize-arxiv-paper.yaml"
