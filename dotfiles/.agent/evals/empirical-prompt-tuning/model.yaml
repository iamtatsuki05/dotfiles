name: empirical-prompt-tuning-model-eval
description: |
  Model-backed quality evaluation for the empirical-prompt-tuning skill.
skill: empirical-prompt-tuning
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: empirical_tuning_plan_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response define metrics, trials, and iteration criteria?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: empirical_process_detected
    config:
      regex_match:
        - "(?i)(metric|trial|baseline|iteration|evaluate)"
  - type: text
    name: unbiased_runner_explained
    config:
      regex_match:
        - "(?i)(unbiased|blind|executor|rubric|self-report)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/tune-skill-prompt.yaml"
