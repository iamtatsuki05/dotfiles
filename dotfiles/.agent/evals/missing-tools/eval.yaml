name: missing-tools-eval
description: |
  Smoke evaluation suite for the missing-tools skill.
skill: missing-tools
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6

metrics:
  - name: missing_tool_fallback
    weight: 1.0
    threshold: 0.8
    description: Did the skill handle a missing command without recommending a global install?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 10"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/*.yaml"
