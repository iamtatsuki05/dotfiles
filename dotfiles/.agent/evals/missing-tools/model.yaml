name: missing-tools-model-eval
description: |
  Model-backed quality evaluation for the missing-tools skill.
skill: missing-tools
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: safe_missing_tool_plan
    weight: 1.0
    threshold: 0.8
    description: Did the response prefer local, mise, direnv, comma, or Nix fallbacks instead of global installation?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: mentions_safe_fallback
    config:
      regex_match:
        - "(?i)(direnv|mise|comma|nix run|nix shell|global install)"
  - type: text
    name: avoids_unapproved_install
    config:
      regex_not_match:
        - "(?i)(brew install|npm install -g|npm i -g|pnpm add -g|yarn global add|uv tool install|pipx install)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/handle-command-not-found.yaml"
