name: gws-model-eval
description: |
  Model-backed quality evaluation for the gws skill.
skill: gws
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: gws_operation_plan_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response identify the intended gws command and safety checks?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: gws_cli_detected
    config:
      regex_match:
        - "(?i)(gws|calendar|gmail|drive|tasks)"
  - type: text
    name: confirmation_or_privacy_explained
    config:
      regex_match:
        - "(?i)(confirm|permission|privacy|dry-run|scope)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/inspect-calendar.yaml"
