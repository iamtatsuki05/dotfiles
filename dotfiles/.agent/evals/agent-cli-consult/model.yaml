name: agent-cli-consult-model-eval
description: |
  Model-backed quality evaluation for the agent-cli-consult skill.
skill: agent-cli-consult
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: agent_cli_consultation_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response frame a bounded external agent CLI consultation?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: agent_cli_detected
    config:
      regex_match:
        - "(?i)(codex|claude|consult|review|debug)"
  - type: text
    name: scope_or_safety_explained
    config:
      regex_match:
        - "(?i)(scope|prompt|read-only|review|result|finding)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/consult-claude-review.yaml"
  - "tasks/consult-codex-debug.yaml"
