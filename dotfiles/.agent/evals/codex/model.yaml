name: codex-model-eval
description: |
  Model-backed quality evaluation for the codex skill.
skill: codex
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6

metrics:
  - name: codex_consultation_quality
    weight: 1.0
    threshold: 0.8
    description: Did the response frame a bounded Codex consultation?

graders:
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 80"
  - type: text
    name: codex_cli_detected
    config:
      regex_match:
        - "(?i)(codex|consult|review|debug)"
  - type: text
    name: scope_or_result_explained
    config:
      regex_match:
        - "(?i)(scope|prompt|result|read-only|finding)"
  - type: text
    name: no_runtime_errors
    config:
      regex_not_match:
        - "(?i)fatal error|crashed|exception occurred"

tasks:
  - "tasks/consult-codex-debug.yaml"
