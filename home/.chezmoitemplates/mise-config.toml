[tools]
# lang
bun = "latest"
node = "22"
go = "1.25"
golangci-lint = "latest"
task = "latest"
# mise use -g java@zulu-8.90.0.19 or zulu-11.84.17.0 or zulu-17.62.17.0 or zulu-21.46.19.0
java = "zulu-21"
python = "3.13"
uv = "latest"
poetry = "latest"
"pipx:markitdown" = "latest"
"pipx:google-colab-cli" = "latest"
rust = "latest"
chezmoi = "latest"
# ai
codex = "latest"
claude-code = "latest"
opencode = "latest"
"pipx:git+https://github.com/NousResearch/hermes-agent.git" = "latest"
"npm:@github/copilot" = "latest"
"npm:openclaw" = "latest"
"npm:@xai-official/grok" = "latest"
"npm:@desplega.ai/agent-swarm" = "latest"
# infra
docker-cli = "latest"
docker-compose = "latest"
kubectl = "latest"
k9s = "latest"
mysql = "8.0"
sqlite = "3.51"
redis = "8.2"
terraform = "latest"
aws-cli = "latest"
aws-vault = "latest"
gcloud = "latest"

[tools."http:devin"]
version = "latest"
url = 'https://static.devin.ai/cli/__MISE_OPEN__ version __MISE_CLOSE__/devin-__MISE_OPEN__ version __MISE_CLOSE__-__MISE_OPEN__ arch(x64="x86_64", arm64="aarch64") __MISE_CLOSE__-__MISE_OPEN__ os(macos="apple-darwin", linux="unknown-linux") __MISE_CLOSE__.tar.gz'
version_list_url = "https://static.devin.ai/cli/current/manifest.json"
bin = "devin"

[tools."http:cursor-agent"]
version = "2026.05.09-0afadcc"
url = 'https://downloads.cursor.com/lab/__MISE_OPEN__ version __MISE_CLOSE__/__MISE_OPEN__ os(macos="darwin", linux="linux") __MISE_CLOSE__/__MISE_OPEN__ arch(x64="x64", arm64="arm64") __MISE_CLOSE__/agent-cli-package.tar.gz'
bin = "cursor-agent"

[env]
HOMEBREW_BUNDLE_DUMP_NO_GO = "1"

[tasks.python-format]
alias = "ruff-format"
description = "Pythonをruffでformat/fix"
run = "uv run ruff check . --fix;uv run ruff format ."

[tasks.python-lint]
alias = "tox"
description = "Python test/lintをtoxで実行"
run = "uv run tox"

[tasks.tensorboard]
alias = "tensorboard"
description = "TensorBoardを起動"
run = "tensorboard --port 6006 --logdir ./ --host 0.0.0.0"

[tasks.jupyterlab]
alias = "jupyter"
description = "JupyterLabを起動"
run = "jupyter lab --port=8888 --ip=0.0.0.0 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''"

[tasks.go-build]
alias = "go-build"
description = "Goをlinux/amd64向けにbuild"
run = "GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build"

[tasks.docker-compose]
alias = "docker-compose-build"
description = "Docker Composeをbuildして起動"
run = "docker compose up -d --build"

[tasks.chezmoi-diff]
description = "chezmoi適用差分を確認"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/chezmoi_apply.sh --dry-run"

[tasks.chezmoi-apply]
description = "chezmoi source stateを適用"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/chezmoi_apply.sh"

[tasks.dotfiles-test]
alias = "test-dotfiles"
description = "dotfilesの全体テストを実行"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh tests/run.sh"

[tasks.agent-sync]
description = "AI agent設定/hooks/skillsを同期"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/setup_agent_files.sh"

[tasks.kimi-webbridge-setup]
description = "Kimi WebBridgeのlocal serviceとagent skillを設定"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/setup_kimi_webbridge.sh"

[tasks.waza-check]
description = "Wazaでmarkdown-docs skillをcheck"
dir = "__DOTFILES_REPO_ROOT__"
run = "cd dotfiles/.agent && WAZA_NO_UPDATE_CHECK=1 nix run path:../..#waza -- check skills/markdown-docs"

[tasks.waza-eval]
description = "Waza mock evalを1 suite実行"
dir = "__DOTFILES_REPO_ROOT__"
run = "WAZA_NO_UPDATE_CHECK=1 nix run path:.#waza -- run dotfiles/.agent/evals/markdown-docs/eval.yaml --context-dir dotfiles/.agent/evals/markdown-docs/fixtures --output-dir .waza-results -v"

[tasks.waza-eval-all]
description = "Waza mock evalを全suite実行"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/waza_eval_all.sh"

[tasks.waza-eval-model]
description = "Waza model evalをCLI agentで実行"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/waza_eval_model.sh"

[tasks.waza-dashboard]
description = "Waza結果dashboardを起動"
dir = "__DOTFILES_REPO_ROOT__"
run = "WAZA_NO_UPDATE_CHECK=1 nix run path:.#waza -- serve --results-dir .waza-results"

[tasks.agent-skill-update]
description = "外部upstream skillをreview更新"
dir = "__DOTFILES_REPO_ROOT__"
run = "python3 scripts/agent_skill_upstreams.py update"

[tasks.nix-migrate-brew]
description = "Homebrew状態をNix管理へ移行"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/migrate_brew_to_nix.sh --apply"

[tasks.nix-build]
description = "Nix CLI profileをdry-run build"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_install.sh --cli-only --dry-run"

[tasks.nix-apply]
description = "Nix CLI profileを適用"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_install.sh --cli-only"

[tasks.nix-apply-with-gui-apps]
description = "Nix profileとGUI appsを適用"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_install.sh --with-gui-apps"

[tasks.nix-portable-install]
description = "sudoなしLinuxへnix-portable導入"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_portable_install.sh"

[tasks.nix-portable-shell]
description = "nix-portable shellを起動"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_portable_install.sh --shell"

[tasks.nix-remove-homebrew]
description = "Nix移行後にHomebrewを削除"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/remove_homebrew.sh --apply --confirm-nix-ready"

[tasks.package-cleanup]
alias = "nix-brew-cleanup"
description = "Nix/Homebrew cacheを掃除"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/cleanup_package_caches.sh"

[tasks.lock-update]
alias = "nix-lock-update"
description = "flake.lockを更新"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock"

[tasks.lock-update-nixpkgs]
alias = "nixpkgs-lock-update"
description = "flake.lockのnixpkgsだけ更新"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock --nix-input nixpkgs"

[tasks.lock-update-home-manager]
alias = "home-manager-lock-update"
description = "flake.lockのhome-managerだけ更新"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock --nix-input home-manager"

[tasks.lock-update-nix-darwin]
alias = "nix-darwin-lock-update"
description = "flake.lockのnix-darwinだけ更新"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock --nix-input nix-darwin"

[tasks.nix-update]
alias = "nix-upgrade"
description = "Nix管理toolを更新して適用"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix"

[tasks.nixpkgs-update]
alias = "nixpkgs-upgrade"
description = "nixpkgs更新後にNix適用"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix --nix-input nixpkgs"

[tasks.home-manager-update]
alias = "home-manager-upgrade"
description = "home-manager更新後にNix適用"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix --nix-input home-manager"

[tasks.nix-darwin-update]
alias = "nix-darwin-upgrade"
description = "nix-darwin更新後にNix適用"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix --nix-input nix-darwin"

[tasks.mise-update]
alias = "mise-upgrade"
description = "mise管理toolを更新"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only mise"

[tasks.package-update]
alias = "nix-mise-upgrade"
description = "Nix/mise管理toolをまとめて更新"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh"

[tasks.git-head-commit-reset]
description = "直近commitをsoft reset"
run = "git reset --soft HEAD^"
