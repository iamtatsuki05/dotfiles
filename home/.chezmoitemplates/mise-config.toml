[settings]
# リリース直後の侵害リスクを避けるため、fuzzy/latest 解決は7日経過後に限定する。
install_before = "7d"

[tools]
# lang
bun = "latest"
node = "20"
go = "1.25"
golangci-lint = "latest"
task = "latest"
# mise use -g java@zulu-8.90.0.19 or zulu-11.84.17.0 or zulu-17.62.17.0 or zulu-21.46.19.0
java = "zulu-21"
python = "3.13"
uv = "latest"
poetry = "latest"
rust = "latest"
chezmoi = "latest"
# infra
docker-cli = "latest"
docker-compose = "latest"
kubectl = "latest"
k9s = "latest"
mysql = "8.0"
sqlite = "3.51"
redis = "8.2"
terraform = "latest"
aws-cli = "latest"
aws-vault = "latest"
gcloud = "latest"

[env]
HOMEBREW_BUNDLE_DUMP_NO_GO = "1"

[tasks.python-format]
alias = "ruff-format"
description = "ruffを使ってコードformatを実行"
run = "uv run ruff check . --fix;uv run ruff format ."

[tasks.python-lint]
alias = "tox"
description = "toxを実行"
run = "uv run tox"

[tasks.tensorboard]
alias = "tensorboard"
description = "tensorboardを起動"
run = "tensorboard --port 6006 --logdir ./ --host 0.0.0.0"

[tasks.jupyterlab]
alias = "jupyter"
description = "jupyterlabを起動"
run = "jupyter lab --port=8888 --ip=0.0.0.0 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''"

[tasks.go-build]
alias = "go-build"
description = "goでbuildするコマンド"
run = "GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build"

[tasks.docker-compose]
alias = "docker-compose-build"
description = "compose fileを起動するコマンド"
run = "docker compose up -d --build"

[tasks.chezmoi-migrate]
description = "既存のdotfiles/configからchezmoi source stateを生成する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/migrate_to_chezmoi.sh --apply"

[tasks.chezmoi-diff]
description = "chezmoiで適用される変更をdry-runで確認する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/chezmoi_apply.sh --dry-run"

[tasks.chezmoi-apply]
description = "chezmoi source stateをホームディレクトリに適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/chezmoi_apply.sh"

[tasks.dotfiles-test]
alias = "test-dotfiles"
description = "dotfilesのshell scriptとchezmoi source stateを検証する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/test_dotfiles.sh"

[tasks.nix-migrate-brew]
description = "現在のHomebrew状態または指定したBrewfileからNix package listと未移行レポートを生成する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/migrate_brew_to_nix.sh --apply"

[tasks.nix-build]
description = "Nix構成をswitchせずにbuildする"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_install.sh --dry-run"

[tasks.nix-apply]
description = "Nix構成を現在のOSへ適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_install.sh"

[tasks.nix-apply-cli]
description = "CLI only profileでNix構成を適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_install.sh --cli-only"

[tasks.nix-apply-with-gui-apps]
description = "GUIが使える環境でNix構成とGUI appsを適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_install.sh --with-gui-apps"

[tasks.nix-portable-install]
description = "sudoなしLinux向けにnix-portableを導入する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_portable_install.sh"

[tasks.nix-portable-shell]
description = "nix-portableでdotfilesのCLI package setを使うshellを起動する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/nix_portable_install.sh --shell"

[tasks.nix-remove-homebrew]
description = "Nix適用後にHomebrewを明示的に削除する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/remove_homebrew.sh --apply --confirm-nix-ready"

[tasks.nix-brew-cleanup]
description = "NixとHomebrewの不要なcacheや古いgenerationを掃除する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/cleanup_package_caches.sh"

[tasks.nix-lock-update]
description = "flake.lockだけを更新する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock"

[tasks.nixpkgs-lock-update]
description = "flake.lockのnixpkgs inputだけを更新する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock --nix-input nixpkgs"

[tasks.home-manager-lock-update]
description = "flake.lockのhome-manager inputだけを更新する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock --nix-input home-manager"

[tasks.nix-darwin-lock-update]
description = "flake.lockのnix-darwin inputだけを更新する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only lock --nix-input nix-darwin"

[tasks.nix-upgrade]
description = "Nixで管理しているものだけを最新化して適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix"

[tasks.nixpkgs-upgrade]
description = "nixpkgs inputだけ更新してNix構成を適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix --nix-input nixpkgs"

[tasks.home-manager-upgrade]
description = "home-manager inputだけ更新してNix構成を適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix --nix-input home-manager"

[tasks.nix-darwin-upgrade]
description = "nix-darwin inputだけ更新してNix構成を適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only nix --nix-input nix-darwin"

[tasks.nix-pin-latest]
description = "指定した Nix tool を nixpkgs master の最新版に pin する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/manage_nix_package_version_override.sh pin-latest"

[tasks.nix-unpin]
description = "指定した Nix tool の明示 pin を外す"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/manage_nix_package_version_override.sh unpin"

[tasks.mise-upgrade]
description = "miseで管理しているものだけを現在のrelease line内で更新する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh --only mise"

[tasks.nix-mise-upgrade]
description = "miseとNixで管理しているものを最新化して適用する"
dir = "__DOTFILES_REPO_ROOT__"
run = "zsh scripts/update_managed_versions.sh"

[tasks.git-head-commit-reset]
alias = "git-head-commit-rest"
description = "git commitの直近1件を取り消す"
run = "git reset --soft HEAD^"
